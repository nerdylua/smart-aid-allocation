<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder image</title>
  <desc id="desc">A neutral placeholder graphic for missing media.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2420" />
      <stop offset="100%" stop-color="#2e3c33" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <g stroke="#9cbf93" stroke-width="4" opacity="0.35">
    <line x1="0" y1="0" x2="1600" y2="900" />
    <line x1="1600" y1="0" x2="0" y2="900" />
    <rect x="120" y="80" width="1360" height="740" fill="none" />
  </g>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#c8f9b6" font-size="88" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="4">
    PLACEHOLDER
  </text>
</svg>
